# Reverse proxy + API gateway + TLS termination + load balancer.
#
# One public entrypoint. Static/UI traffic goes to the Next.js frontend; /api
# and /webhooks are routed to the Django backend. Scale either tier and add
# more "server" lines to the upstream blocks for round-robin load balancing.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # --- upstreams (add more servers to load-balance horizontally) ---
    upstream frontend { server frontend:3000; }
    upstream backend  { server backend:8000; }

    # Basic rate limiting at the edge (defence in depth alongside DRF throttles).
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # --- HTTP: redirect to HTTPS in production (uncomment when TLS is set up) ---
    server {
        listen 80;
        server_name _;

        # return 301 https://$host$request_uri;   # enable once certs exist

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 10m;

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /webhooks/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /healthz/ {
            proxy_pass http://backend;
        }

        # WebSocket upgrade for real-time features (Django Channels).
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Everything else → the Next.js frontend.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- HTTPS server (uncomment and mount certs to terminate TLS here) ---
    # server {
    #     listen 443 ssl http2;
    #     server_name app.commandcentre.ng;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     # ... same location blocks as above ...
    # }
}
