apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: command-centre
spec:
  replicas: 3                      # horizontal scaling / load balancing across pods
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/command-centre-backend:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: command-centre-secrets }
          env:
            - { name: DJANGO_ENV, value: production }
          readinessProbe:
            httpGet: { path: /healthz/, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz/, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: command-centre
spec:
  selector: { app: backend }
  ports: [{ port: 8000, targetPort: 8000 }]
---
# Autoscale on CPU — the load balancer (Service) spreads traffic across pods.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend
  namespace: command-centre
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: backend }
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: command-centre
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/command-centre-backend:latest
          command: ["python", "manage.py", "process_outbound"]
          envFrom:
            - secretRef: { name: command-centre-secrets }
          env:
            - { name: DJANGO_ENV, value: production }
