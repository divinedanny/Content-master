# Production-shaped local stack: nginx gateway → frontend + backend,
# with the outbound worker, PostgreSQL and Redis.
#
#   cp backend/.env.example backend/.env   # then fill in real values
#   # set POSTGRES_PASSWORD (and other secrets) in backend/.env — none are hardcoded here
#   docker compose up --build
#   open http://localhost:8080
#
# One public port (8080 via nginx). Scale a tier: `docker compose up --scale backend=3`.

services:
  db:
    image: postgres:16-alpine
    # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD come from backend/.env —
    # no credentials are hardcoded in this file.
    env_file: ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes so the container's own shell resolves these from its env.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    # DB credentials come from env_file; only non-secret overrides live here.
    environment:
      DJANGO_ENV: production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application -b 0.0.0.0:8000 -w 3 --access-logfile -"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DJANGO_ENV: production
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
    command: python manage.py process_outbound
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build: ./frontend
    environment:
      BACKEND_ORIGIN: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      # - "443:443"   # enable with TLS certs mounted below
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
