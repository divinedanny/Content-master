apiVersion: v1
kind: Namespace
metadata:
  name: command-centre
---
# TEMPLATE. Do not commit real secrets — create this via `kubectl create secret`
# or a sealed-secrets / external-secrets operator in a real cluster.
apiVersion: v1
kind: Secret
metadata:
  name: command-centre-secrets
  namespace: command-centre
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "replace-me"
  DJANGO_ALLOWED_HOSTS: "app.commandcentre.ng"
  CORS_ALLOWED_ORIGINS: "https://app.commandcentre.ng"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://app.commandcentre.ng"
  POSTGRES_DB: "commandcentre"
  POSTGRES_USER: "commandcentre"
  POSTGRES_PASSWORD: "replace-me"
  POSTGRES_HOST: "your-managed-postgres-host"
  REDIS_URL: "redis://your-managed-redis:6379/0"
  API_KEYS: "rotate-me-comma-separated"
  MONNIFY_API_KEY: "replace-me"
  MONNIFY_SECRET_KEY: "replace-me"
  MONNIFY_CONTRACT_CODE: "replace-me"
